<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details — MovieBook</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    .movie-detail-hero {
      background-attachment: fixed;
    }
    @media (max-width: 768px) {
      #movie-content .container > div { flex-direction: column; }
      #movie-content img { width: 140px !important; }
    }
  </style>
</head>
<body data-page="movie">

  <nav class="navbar" id="navbar"></nav>
  <div id="toast-container"></div>

  <div class="page" id="movie-content">
    <div class="loading-page" style="padding-top:120px;">
      <div class="spinner"></div>
      <p style="color:var(--text-3);">Loading movie…</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
