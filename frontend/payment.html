<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — MovieBook</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    .secure-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(52,199,89,0.1);
      border: 1px solid rgba(52,199,89,0.3);
      color: #34c759;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .timer-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(244,168,67,0.1);
      border: 1px solid rgba(244,168,67,0.3);
      color: var(--gold);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    #countdown { font-family: var(--font-mono); }
  </style>
</head>
<body data-page="payment">

  <nav class="navbar" id="navbar"></nav>
  <div id="toast-container"></div>

  <!-- Progress bar -->
  <div style="background:var(--bg-2);border-bottom:1px solid var(--border);padding:16px 0;margin-top:72px;">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:16px;">
          <span class="secure-badge">🔒 Secure Payment</span>
          <span class="timer-badge">⏱ Seats held: <span id="countdown">10:00</span></span>
        </div>
      </div>
      <!-- Step indicator -->
      <div style="display:flex;align-items:center;justify-content:center;gap:0;max-width:500px;margin:0 auto;">
        <div style="display:flex;align-items:center;gap:8px;opacity:0.5;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;">✓</div>
          <span style="font-size:0.82rem;">Seats Selected</span>
        </div>
        <div style="flex:1;height:2px;background:var(--red);margin:0 16px;max-width:80px;"></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:white;">2</div>
          <span style="font-size:0.82rem;font-weight:600;">Payment</span>
        </div>
        <div style="flex:1;height:2px;background:var(--border);margin:0 16px;max-width:80px;"></div>
        <div style="display:flex;align-items:center;gap:8px;opacity:0.4;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;">3</div>
          <span style="font-size:0.82rem;">Confirm</span>
        </div>
      </div>
    </div>
  </div>

  <div id="payment-content">
    <div class="loading-page" style="padding:80px 0;">
      <div class="spinner"></div>
      <p style="color:var(--text-3);margin-top:12px;">Loading payment…</p>
    </div>
  </div>

  <!-- Razorpay Payment Gateway -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 10-minute countdown timer for seat hold
    (() => {
      let seconds = 10 * 60;
      const el = document.getElementById('countdown');
      if (!el) return;
      const tick = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(tick);
          showToast('error', 'Session expired', 'Your seats have been released. Please try again.');
          setTimeout(() => window.location.href = 'index.html', 2000);
          return;
        }
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        el.textContent = `${m}:${String(s).padStart(2,'0')}`;
        if (seconds <= 60) el.style.color = 'var(--red)';
      }, 1000);
    })();
  </script>
</body>
</html>
