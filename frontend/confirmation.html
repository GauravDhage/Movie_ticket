<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed — MovieBook</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    /* Step 3 highlight */
    .step-done {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .step-done .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #34c759;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: white;
    }
  </style>
</head>
<body data-page="confirmation">

  <nav class="navbar" id="navbar"></nav>
  <div id="toast-container"></div>

  <!-- Progress bar - all done -->
  <div style="background:var(--bg-2);border-bottom:1px solid var(--border);padding:16px 0;margin-top:72px;">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:center;gap:0;max-width:500px;margin:0 auto;">
        <div class="step-done" style="opacity:0.5;">
          <div class="step-num">✓</div>
          <span style="font-size:0.82rem;">Seats Selected</span>
        </div>
        <div style="flex:1;height:2px;background:#34c759;margin:0 16px;max-width:80px;"></div>
        <div class="step-done" style="opacity:0.5;">
          <div class="step-num">✓</div>
          <span style="font-size:0.82rem;">Payment Done</span>
        </div>
        <div style="flex:1;height:2px;background:#34c759;margin:0 16px;max-width:80px;"></div>
        <div class="step-done">
          <div class="step-num">✓</div>
          <span style="font-size:0.82rem;font-weight:600;">Confirmed!</span>
        </div>
      </div>
    </div>
  </div>

  <div id="confirmation-content">
    <div class="loading-page" style="padding:80px 0;">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Footer links -->
  <div style="text-align:center;padding:24px;color:var(--text-3);font-size:0.82rem;border-top:1px solid var(--border);margin-top:40px;">
    <a href="index.html" style="color:var(--text-2);margin:0 12px;">Browse Movies</a>
    <a href="profile.html" style="color:var(--text-2);margin:0 12px;">My Tickets</a>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Launch confetti on success
    function launchConfetti() {
      const colors = ['#e63946','#f4a843','#34c759','#4a8aff','#ff6b9d','#ffd166'];
      for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width  = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay   = (Math.random() * 1.5) + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    // Fire confetti only on success
    document.addEventListener('DOMContentLoaded', () => {
      const data = JSON.parse(sessionStorage.getItem('mb_confirmed_booking') || '{}');
      if (!data.failed) setTimeout(launchConfetti, 400);
    });
  </script>
</body>
</html>
