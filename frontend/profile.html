<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — MovieBook</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    @media (max-width: 900px) {
      #profile-content .container > div {
        grid-template-columns: 1fr !important;
      }
      #profile-content .card[style*="sticky"] {
        position: static !important;
      }
    }
  </style>
</head>
<body data-page="profile">

  <nav class="navbar" id="navbar"></nav>
  <div id="toast-container"></div>

  <!-- Page header -->
  <div style="background:var(--bg-2);border-bottom:1px solid var(--border);padding:20px 0;margin-top:72px;">
    <div class="container">
      <h1 style="font-size:1.4rem;font-weight:700;font-family:var(--font-display);">My Profile</h1>
      <p style="color:var(--text-3);font-size:0.85rem;margin-top:4px;">Manage your bookings and account</p>
    </div>
  </div>

  <div id="profile-content">
    <div class="loading-page" style="padding:80px 0;">
      <div class="spinner"></div>
      <p style="color:var(--text-3);margin-top:12px;">Loading your tickets…</p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
